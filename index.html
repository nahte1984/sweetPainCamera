<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sweet pain camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            
            /* 泡泡糖色相環 + 5秒呼吸模糊效果 */
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(15px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* start.png 基礎樣式 */
        #overlay-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
            pointer-events: none;
            z-index: 10;
            
            /* 改用 CSS Transition，方便由 JS 精準控制何時淡出 */
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        /* 當相機成功運作後，由 JS 加上這個 class 來執行淡出 */
        #overlay-img.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 拍照閃光燈效果層 */
        #flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        /* 錯誤訊息提示區塊 */
        #error-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff4a4a;
            font-family: monospace;
            z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    
    <img id="overlay-img" src="start.png" alt="Sweet Pain Start">
    
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');
        const flashLayer = document.getElementById('flash-layer');
        const overlayImg = document.getElementById('overlay-img');
        let isCapturing = false;

        // 檢查瀏覽器是否支援相機 API
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            
            const constraints = {
                video: { facingMode: "environment" },
                audio: false
            };

            // 呼叫相機
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    // 當影片真正開始播放（使用者已同意權限且畫面出來了）才觸發計時
                    video.onplaying = () => {
                        setTimeout(() => {
                            overlayImg.classList.add('fade-out');
                        }, 1000); // 出現一秒後開始 fade out
                    };
                    
                    video.play();
                })
                .catch(function(err) {
                    console.error("相機權限遭拒或發生錯誤: ", err);
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 拍照事件
        window.addEventListener('pointerdown', (e) => {
            if (video.videoWidth === 0 || isCapturing) return;
            
            isCapturing = true;

            // 瞬間閃白效果
            flashLayer.style.transition = 'none';
            flashLayer.style.opacity = '1';
            
            setTimeout(() => {
                flashLayer.style.transition = 'opacity 1s ease-out';
                flashLayer.style.opacity = '0';
            }, 50);

            // 擷取畫布
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            const currentFilter = window.getComputedStyle(video).filter;
            ctx.filter = currentFilter;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            setTimeout(() => {
                const saveConfirm = confirm("💔💔💔");
                
                if (saveConfirm) {
                    const dataURL = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `sweet-pain-${Date.now()}.png`;
                    link.href = dataURL;
                    link.click();
                }
                
                isCapturing = false;
            }, 400);
        });
    </script>
</body>
</html>
