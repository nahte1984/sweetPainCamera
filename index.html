<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sweet pain camera v0.7</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            pointer-events: none;
            
            /* 10 秒一個循環的泡泡糖與呼吸模糊效果 */
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(15px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        #overlay-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-img.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff4a4a;
            font-family: monospace;
            z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    <img id="overlay-img" src="start.png" alt="Sweet Pain Start">
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');
        const flashLayer = document.getElementById('flash-layer');
        const overlayImg = document.getElementById('overlay-img');
        
        let isCapturing = false;
        let animationStartTime = null; // 用來精準對齊 CSS 動畫的時間軸

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = {
                video: { facingMode: "environment" },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        // 畫面開始播放時，記錄時間起點，確保 JS 算出來的顏色跟 CSS 完全同步
                        if (!animationStartTime) {
                            animationStartTime = Date.now();
                        }
                        setTimeout(() => {
                            overlayImg.classList.add('fade-out');
                        }, 1000);
                    };
                    
                    video.play();
                })
                .catch(function(err) {
                    console.error("相機權限遭拒或發生錯誤: ", err);
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 拍照事件
        window.addEventListener('pointerdown', (e) => {
            if (video.videoWidth === 0 || isCapturing) return;
            isCapturing = true;

            // 1. 瞬間閃白效果
            flashLayer.style.transition = 'none';
            flashLayer.style.opacity = '1';
            
            setTimeout(() => {
                flashLayer.style.transition = 'opacity 1s ease-out';
                flashLayer.style.opacity = '0';
            }, 50);

            // 2. 【核心算法】手動計算點擊當下的 CSS 濾鏡狀態
            const loopDuration = 10000; // 10秒循環
            const elapsed = (Date.now() - animationStartTime) % loopDuration;
            const progress = elapsed / loopDuration; // 0 ~ 1 之間的進度值

            // 計算色相角度 (0 ~ 360)
            const hueRotate = Math.floor(progress * 360);

            // 計算模糊像素 (0s 為 0px -> 5s 為 15px -> 10s 回到 0px)
            let blurPx = 0;
            if (progress <= 0.5) {
                blurPx = (progress / 0.5) * 15;
            } else {
                blurPx = ((1 - progress) / 0.5) * 15;
            }
            blurPx = blurPx.toFixed(1);

            // 組裝出跟 CSS 完全一模一樣的濾鏡字串
            const targetFilter = `contrast(120%) saturate(260%) brightness(110%) hue-rotate(${hueRotate}deg) blur(${blurPx}px)`;

            // 3. 【雙畫布技術】繞過手機 Safari 無法直接對視訊轉濾鏡的 Bug
            // 畫布 A：先擷取乾淨的原生相機畫面
            const rawCanvas = document.createElement('canvas');
            rawCanvas.width = video.videoWidth;
            rawCanvas.height = video.videoHeight;
            const rawCtx = rawCanvas.getContext('2d');
            rawCtx.drawImage(video, 0, 0, rawCanvas.width, rawCanvas.height);

            // 畫布 B：用來上色與套模糊效果
            const filterCanvas = document.createElement('canvas');
            filterCanvas.width = video.videoWidth;
            filterCanvas.height = video.videoHeight;
            const filterCtx = filterCanvas.getContext('2d');
            
            // 注入剛剛算好、帶有時間凍結的完美濾鏡，然後把畫布 A 蓋上去壓製
            filterCtx.filter = targetFilter;
            filterCtx.drawImage(rawCanvas, 0, 0, filterCanvas.width, filterCanvas.height);

            // 4. 跳出確認視窗，並確保按下任何按鈕後都不卡死
            setTimeout(() => {
                const saveConfirm = confirm("💔💔💔");
                
                if (saveConfirm) {
                    // 導出帶有精美濾鏡的照片
                    const dataURL = filterCanvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `sweet-pain-${Date.now()}.png`;
                    link.href = dataURL;
                    link.click();
                }
                
                // 【關鍵修復】無論按確定或取消，都強迫相機重新啟動播放，解除畫面凍結
                video.play().then(() => {
                    isCapturing = false;
                }).catch(err => {
                    console.log("重啟播放被攔截:", err);
                    isCapturing = false;
                });
                
            }, 400);
        });
    </script>
</body>
</html>
