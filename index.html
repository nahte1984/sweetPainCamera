<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Coding - 實時相機藝術</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 確保相機畫面填滿螢幕不變形 */
            pointer-events: none;
            
            /* 【藝術家控制台】用 CSS 濾鏡快速創造 Vibe */
            /* 這裡設定了高對比、過度飽和，以及色彩反轉，你可以自由修改數值 */
            filter: contrast(150%) saturate(200%) invert(80%) hue-rotate(90deg);
        }

        .overlay-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 2rem;
            letter-spacing: 4px;
            mix-blend-mode: difference;
            z-index: 10;
        }

        /* 錯誤訊息提示區塊 */
        #error-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            color: red;
            font-family: monospace;
            z-index: 20;
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    
    <div class="overlay-text">REALITY DISTORTION</div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');

        // 檢查瀏覽器是否支援相機 API
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            
            // 設定我們要的媒體類型
            const constraints = {
                video: {
                    facingMode: "environment" // 強制使用後置鏡頭 (如果是 'user' 則是前置自拍鏡頭)
                },
                audio: false // 我們不需要麥克風
            };

            // 呼叫相機
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    // 如果使用者允許，把相機的影像流 (stream) 灌入 video 標籤
                    video.srcObject = stream;
                })
                .catch(function(err) {
                    // 如果使用者拒絕，或是發生錯誤
                    console.error("相機權限遭拒或發生錯誤: ", err);
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }
    </script>
</body>
</html>
