<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SweetPainCamera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            cursor: pointer; /* 提示使用者整個螢幕都可以點擊 */
        }

        #camera-feed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* 確保相機畫面填滿螢幕不變形 */
            pointer-events: none;
            
            /* 【80s 泡泡糖糖果風】基礎濾鏡：高飽和度、輕微高對比與明亮感 */
            /* 透過 CSS animation 讓色相（hue-rotate）動態循環，創造不斷流動的迷幻糖果色彩 */
            animation: bubblegum-gradient 12s linear infinite;
        }

        /* 色相環緩慢漸變動畫 */
        @keyframes bubblegum-gradient {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg);
            }
        }

        /* 替換原本的文字，改為置中讀取 start.png */
        #overlay-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 70%;
            max-height: 70%;
            object-fit: contain;
            pointer-events: none; /* 讓點擊事件可以穿透圖層，不影響拍照 */
            z-index: 10;
            /* 如果想讓圖片也融入色彩變幻，可以解開下方註解；若想保持原圖顏色則維持現狀 */
            /* mix-blend-mode: soft-light; */
        }

        /* 拍照閃光燈效果層 */
        #flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        /* 錯誤訊息提示區塊 */
        #error-msg {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff4a4a;
            font-family: monospace;
            z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    
    <img id="overlay-img" src="start.png" alt="Sweet Pain Start">
    
    <div id="flash-layer"></div>
    
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');
        const flashLayer = document.getElementById('flash-layer');
        let isCapturing = false; // 防止連續點擊導致重複觸發

        // 檢查瀏覽器是否支援相機 API
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            
            const constraints = {
                video: {
                    facingMode: "environment" // 強制使用後置鏡頭
                },
                audio: false
            };

            // 呼叫相機
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                })
                .catch(function(err) {
                    console.error("相機權限遭拒或發生錯誤: ", err);
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 3. 點擊/觸控螢幕啟動拍照與閃白效果
        window.addEventListener('click', () => {
            // 如果影片還沒載入完成或正在處理拍照，則不觸發
            if (video.readyState !== video.HAVE_ENOUGH_DATA || isCapturing) return;
            
            isCapturing = true;

            // --- 閃白特效 (約1秒) ---
            flashLayer.style.transition = 'none';
            flashLayer.style.opacity = '1'; // 瞬間變全白
            
            // 讓白色微調後在 1 秒內緩緩淡出
            setTimeout(() => {
                flashLayer.style.transition = 'opacity 1s ease-out';
                flashLayer.style.opacity = '0';
            }, 50);

            // --- 擷取當下畫面與濾鏡 ---
            // 建立一個隱藏的 canvas 來畫圖
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            /* 【技術重點】
              為了精準捕捉點擊當下「色相環漸變動畫」的繽紛顏色，
              我們直接抓取 video 標籤當前的計算樣式 (Computed Style) 中的 filter 屬性，
              並直接注入到 canvas 的 context 濾鏡中！這樣拍出來的圖就會帶有當下的泡泡糖 Vibe。
            */
            const currentFilter = window.getComputedStyle(video).filter;
            ctx.filter = currentFilter;
            
            // 將視訊畫面繪製到 canvas 上
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 閃白淡出差不多時，跳出詢問視窗問使用者要不要存檔
            setTimeout(() => {
                const saveConfirm = confirm("捕捉到可愛的瞬間了！要儲存這張照片嗎？");
                
                if (saveConfirm) {
                    // 轉成 base64 圖片並觸發下載
                    const dataURL = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `sweet-pain-${Date.now()}.png`;
                    link.href = dataURL;
                    link.click();
                }
                
                // 解除點擊鎖定
                isCapturing = false;
            }, 400); // 在閃白過後不久即跳出提示，感官體驗最流暢
        });
    </script>
</body>
</html>
