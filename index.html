<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sweet pain camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #camera-feed {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            pointer-events: none;
            
            /* 10 秒循環的泡泡糖與呼吸模糊效果 */
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(15px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* 🥲 符號的樣式與淡出控制 */
        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7.5rem; /* 讓表情足夠放大、有衝擊感 */
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            /* 平滑淡出過渡 */
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    
    <div id="overlay-emoji">🥲</div>
    
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');

        // 啟動相機
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    // 當相機畫面真正開始播放時才啟動計時
                    video.onplaying = () => {
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000); // 1秒後開始淡出，花1秒淡完，剛好兩秒
                    };
                    
                    video.play();
                })
                .catch(function(err) {
                    console.error("相機存取失敗:", err);
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }
    </script>
</body>
</html>
