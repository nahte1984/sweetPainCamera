<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.4.0 sweet pain central kaleidoscope</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        /* 萬花筒外殼：絕對固定，不進行全域縮放 */
        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        /* 保持 10 秒泡泡糖色相環與 5px 精緻模糊效果 */
        #kaleidoscope-canvas {
            width: 100%; height: 100%;
            display: block;
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(5px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* 🥲 表情符號 */
        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.1rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 全螢幕故障閃白層 */
        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <canvas id="kaleidoscope-canvas"></canvas>
    </div>
    
    <video id="camera-feed" autoplay playsinline muted style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></video>
    
    <div id="overlay-emoji">🥲</div>
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('kaleidoscope-canvas');
        const ctx = canvas.getContext('2d');
        
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        // 控制參數
        let currentScale = 1.00; // 核心等份內畫面的縮放倍率
        let lastScale = 1.00;

        // 啟動相機
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        // 1秒後開場表情優雅淡出
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        // 啟動 12 等份中央萬花筒渲染
                        requestAnimationFrame(renderCentralKaleidoscope);
                        
                        // 啟動 1~3 秒隨機故障閃白與抽搐放大排程
                        scheduleNextGlitch();
                    };
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // --- 【全新設計：以畫面中心為原點的 12 等份對稱萬花筒引擎】 ---
        function renderCentralKaleidoscope() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 自動隨螢幕尺寸重設畫布大小
                if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 計算能完美覆蓋整個螢幕四個角落的半徑大小
                const radius = Math.sqrt(cx * cx + cy * cy);
                const rad30 = 30 * Math.PI / 180; // 30 度的弧度 (360度 / 12等份)

                // 依據即時變動的 currentScale 計算相機畫面擷取框
                const baseVSize = Math.min(video.videoWidth, video.videoHeight) * 0.6;
                const zoomedVSize = baseVSize / currentScale;
                
                const sx = (video.videoWidth - zoomedVSize) / 2;
                const sy = (video.videoHeight - zoomedVSize) / 2;

                // 鏡頭內部微幅動態飄移（增添呼吸感）
                const driftX = Math.sin(Date.now() / 3000) * (video.videoWidth - zoomedVSize) * 0.04;
                const driftY = Math.cos(Date.now() / 3000) * (video.videoHeight - zoomedVSize) * 0.04;

                // 繞著中心點環繞繪製 12 塊三角切片
                for (let i = 0; i < 12; i++) {
                    ctx.save();
                    ctx.translate(cx, cy); // 移到螢幕中心
                    ctx.rotate(i * rad30); // 旋轉對應角度
                    
                    // 兩兩對稱關鍵：奇數片進行水平翻轉，達成完璧的物理鏡面反射
                    if (i % 2 === 1) {
                        ctx.scale(1, -1);
                    }

                    // 精準裁剪出 30 度的放射狀扇形切片
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(radius, 0);
                    ctx.lineTo(radius * Math.cos(rad30), radius * Math.sin(rad30));
                    ctx.closePath();
                    ctx.clip();

                    // 將視訊畫面以螢幕中心為錨點均勻向外擴散，完全消滅黑邊
                    ctx.drawImage(
                        video,
                        sx + driftX, sy + driftY, zoomedVSize, zoomedVSize,
                        -radius, -radius, radius * 2, radius * 2
                    );

                    ctx.restore();
                }
            }
            requestAnimationFrame(renderCentralKaleidoscope);
        }

        // 隨機故障排程：1秒到3秒間隨機觸發
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    // 驗證機制：確保每次等份內縮放都有大於 0.5 的明顯跳躍，避免視覺卡頓錯覺
                    do {
                        randomScale = (Math.random() * 3 + 1).toFixed(2); // 1~4 倍率縮放
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.5);
                    
                    lastScale = targetScaleNum;
                    
                    // 更新內部畫面縮放（幾何外框此時絕對固定靜止）
                    currentScale = targetScaleNum;
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 超高頻閃爍演算法（一組閃爍3~6下）
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 4) + 3; 
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
