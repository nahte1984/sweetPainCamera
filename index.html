<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.0.5 sweet pain camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform;
        }

        #camera-feed {
            width: 100%; height: 100%;
            object-fit: cover;
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(5px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.1rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <video id="camera-feed" autoplay playsinline muted></video>
    </div>
    
    <div id="overlay-emoji">🥲</div>
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        // 用來記錄上一次的放大倍率，防止連續抽到相似的大小
        let lastScale = 1.00;

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        scheduleNextGlitch();
                    };
                    
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        function scheduleNextGlitch() {
            // 1. 修改為 1 秒到 3 秒之間隨機觸發 (1000ms ~ 3000ms)
            const randomCooldown = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    // 2. 透過迴圈驗證，確保新尺寸與上一次的尺寸至少有 0.5 以上的顯著跳躍差距
                    do {
                        randomScale = (Math.random() * 3 + 1).toFixed(2); // 維持你設定的 1~4 倍率設計
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.5);
                    
                    // 更新記憶歷史數值
                    lastScale = targetScaleNum;
                    
                    // 執行縮放
                    cameraWrapper.style.transform = `scale(${randomScale})`;
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 4) + 3; // 3 ~ 6 下
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
