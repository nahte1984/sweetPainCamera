<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>sweet pain camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #camera-feed {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            pointer-events: none;
            
            /* 10 秒循環的泡泡糖與呼吸模糊效果 */
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(15px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* 🥲 表情符號樣式 */
        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 7.5rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 自動故障閃白圖層：故意不加 transition 才能展現銳利、瞬間突發的故障感 */
        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <video id="camera-feed" autoplay playsinline muted></video>
    <div id="overlay-emoji">🥲</div>
    
    <div id="flash-layer"></div>
    
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        // 啟動相機
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        // 1. 兩秒後表情 fade out
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        // 2. 畫面動起來後，啟動不規則閃光排程
                        scheduleNextGlitch();
                    };
                    
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 【核心故障演算法】負責排定下一次閃光聚落的時間（5~10秒之間隨機）
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 5000 + 5000; // 5000ms ~ 10000ms 隨機
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    // 當這組閃光閃完後，自動排定下一次
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 負責執行「那一組」不規則的連續閃爍
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 3) + 2; // 隨機閃 2 ~ 4 下
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback(); // 閃完了，交棒回給排程器
                    return;
                }

                // 隨機亮起強度 (0.6 ~ 1.0 之間，製造忽明忽暗的過載感)
                flashLayer.style.opacity = (Math.random() * 0.4 + 0.6).toString();
                
                // 亮起時間極短且隨機 (15ms ~ 60ms)
                setTimeout(() => {
                    flashLayer.style.opacity = '0'; // 熄滅
                    currentFlash++;
                    
                    // 下一下閃光亮起前的冷卻時間也隨機 (40ms ~ 200ms)，形成不規則節奏
                    setTimeout(runSingleFlash, Math.random() * 160 + 40);
                }, Math.random() * 45 + 15);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
