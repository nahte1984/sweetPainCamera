<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-color=1.0, user-scalable=no">
    <title>v10.5.0 sweet pain kaleidoscope</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bona+Nova:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        /* 萬花筒外殼：絕對固定 */
        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        /* 保持 10 秒泡泡糖色相環與 3.1px 精緻模糊效果 */
        #kaleidoscope-canvas {
            width: 100%; height: 100%;
            display: block;
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(3.1px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* 電影感硬體加速暗角遮罩 */
        #vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.5) 65%, rgba(0,0,0,0.92) 100%);
        }

        /* 全畫面文字一體化樣式 */
        #overlay-text {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            
            /* 切換為全新指定的 Bona Nova 字體與 20級字重規範 */
            font-family: 'Bona Nova', Georgia, serif;
            font-size: 20px;   /* 精準設定 20級 */
            font-weight: 400;  
            line-height: 1.6;  
            letter-spacing: 0.5px; 
            color: #ffffff;    
            padding: 30px;
            box-sizing: border-box;
            
            cursor: pointer;
            user-select: none;
            z-index: 20; 
            
            /* 輕量級文字陰影，保護細緻字體的邊緣 */
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.85);
            
            transition: opacity 1.2s ease-out, visibility 1.2s ease-out;
            opacity: 1;
            visibility: visible;
            -webkit-tap-highlight-color: transparent;
        }

        #overlay-text.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 全螢幕故障閃白層 */
        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 30;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <canvas id="kaleidoscope-canvas"></canvas>
    </div>
    
    <div id="vignette-overlay"></div>
    
    <video id="camera-feed" autoplay playsinline muted style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></video>
    
    <div id="overlay-text">
        &lt;sweetPainCamera&gt;
        <br>И горько жалуюсь, и горько слезы лью,
        <br>но строк печальных не смываю.
        <br>&lt;/sweetPainCamera&gt;
        <br>
        <br>(Tap to close)
    </div>
    
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('kaleidoscope-canvas');
        const ctx = canvas.getContext('2d');
        
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayText = document.getElementById('overlay-text');
        const flashLayer = document.getElementById('flash-layer');

        let currentScale = 1.00; 
        let lastScale = 1.00;

        // 啟動相機
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        requestAnimationFrame(renderCentralKaleidoscope);
                        scheduleNextGlitch();
                    };
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 點擊文字區塊本身觸發 fade out 淡出
        overlayText.addEventListener('pointerdown', (e) => {
            e.stopPropagation(); 
            overlayText.classList.add('fade-out');
        });

        // --- 【中心放射 12 等份完璧鏡像渲染引擎】 ---
        function renderCentralKaleidoscope() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const radius = Math.sqrt(cx * cx + cy * cy);
                const rad30 = 30 * Math.PI / 180; 

                const baseVSize = Math.min(video.videoWidth, video.videoHeight) * 0.6;
                const zoomedVSize = baseVSize / currentScale;
                
                const sx = (video.videoWidth - zoomedVSize) / 2;
                const sy = (video.videoHeight - zoomedVSize) / 2;

                const driftX = Math.sin(Date.now() / 3000) * (video.videoWidth - zoomedVSize) * 0.04;
                const driftY = Math.cos(Date.now() / 3000) * (video.videoHeight - zoomedVSize) * 0.04;

                for (let i = 0; i < 12; i++) {
                    ctx.save();
                    ctx.translate(cx, cy); 
                    
                    if (i % 2 === 0) {
                        ctx.rotate(i * rad30);
                    } else {
                        ctx.rotate((i + 1) * rad30);
                        ctx.scale(1, -1);
                    }

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(radius, 0);
                    ctx.lineTo(radius * Math.cos(rad30), radius * Math.sin(rad30));
                    ctx.closePath();
                    ctx.clip();

                    ctx.drawImage(
                        video,
                        sx + driftX, sy + driftY, zoomedVSize, zoomedVSize,
                        -radius, -radius, radius * 2, radius * 2
                    );

                    ctx.restore();
                }
            }
            requestAnimationFrame(renderCentralKaleidoscope);
        }

        // 隨機故障排程：1秒到3.1秒間隨機觸發
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 2100 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    do {
                        randomScale = (Math.random() * 0.5 + 1).toFixed(2); // 穩定在 1.00 ~ 1.50 之間
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.15);
                    
                    lastScale = targetScaleNum;
                    currentScale = targetScaleNum; 
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 超高頻閃爍演算法：每組 1 ~ 6 下超高速白光
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 6) + 1; 
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
