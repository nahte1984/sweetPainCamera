<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.2.0 sweet pain kaleidoscope camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        /* 專職負責接收 JS 的隨機縮放指令的外殼 */
        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform;
        }

        /* 將你最完美的 10 秒泡泡糖色相環與 5px 模糊效果，直接套在萬花筒畫布上 */
        #kaleidoscope-canvas {
            width: 100%; height: 100%;
            display: block;
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(5px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        /* 🥲 表情符號樣式 */
        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.1rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 超高頻故障閃白圖層 */
        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <canvas id="kaleidoscope-canvas"></canvas>
    </div>
    
    <video id="camera-feed" autoplay playsinline muted style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></video>
    
    <div id="overlay-emoji">🥲</div>
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('kaleidoscope-canvas');
        const ctx = canvas.getContext('2d');
        
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        let lastScale = 1.00;

        // 啟動原生相機
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        // 啟動畫布萬花筒渲染流
                        requestAnimationFrame(renderKaleidoscope);
                        
                        // 啟動不規則高頻閃光與跳躍放大排程
                        scheduleNextGlitch();
                    };
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // --- 【核心：Fig. 36 萬花筒畫布渲染引擎】 ---
        function renderKaleidoscope() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // 確保畫布解析度與螢幕隨時精準對齊
                if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                const screenWidth = canvas.width;
                const screenHeight = canvas.height;

                // 清空畫布
                ctx.clearRect(0, 0, screenWidth, screenHeight);

                // 計算 Fig. 36 的 30-60-90 三角形單元核心尺寸 (H = 長直角邊)
                const H = Math.max(screenWidth, screenHeight) * 0.4;
                // 短直角邊 W = H * tan(30度)
                const W = H * Math.tan(30 * Math.PI / 180);

                // 設置 12 角星芒幾何格柵的無縫鋪滿間距
                const hSpacing = H * Math.sqrt(3);
                const vSpacing = H * 2;

                const cols = Math.ceil(screenWidth / hSpacing) + 2;
                const rows = Math.ceil(screenHeight / vSpacing) + 2;

                // 擷取視訊中央正方形，防止萬花筒拉伸變形
                const vSize = Math.min(video.videoWidth, video.videoHeight) * 0.6;
                const sx = (video.videoWidth - vSize) / 2;
                const sy = (video.videoHeight - vSize) / 2;

                // 微幅飄移矩陣：讓鏡頭內部產生微微的流動感，使萬花筒圖騰更具生命力
                const driftX = Math.sin(Date.now() / 3000) * (video.videoWidth - vSize) * 0.1;
                const driftY = Math.cos(Date.now() / 3000) * (video.videoHeight - vSize) * 0.1;

                // 開始鋪設幾何中心點
                for (let c = -1; c < cols; c++) {
                    for (let r = -1; r < rows; r++) {
                        let cx = c * hSpacing;
                        let cy = r * vSpacing;

                        // 奇數網格點陣錯位偏移
                        if (Math.abs(c) % 2 === 1) {
                            cy += H;
                        }

                        // 環繞每個中心點，依據 Fig. 36 切割出 12 個無縫反射區塊
                        for (let i = 0; i < 12; i++) {
                            ctx.save();
                            ctx.translate(cx, cy);
                            
                            // 旋轉出 12 個 30 度的扇形區間
                            ctx.rotate(i * 30 * Math.PI / 180);
                            
                            // 偶數順時針、奇數鏡像反轉，達成完美物理鏡面反射
                            if (i % 2 === 1) {
                                ctx.scale(1, -1);
                            }

                            // 創建 30-60-90 度的直角三角形裁切路徑
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(W, H);
                            ctx.lineTo(0, H);
                            ctx.closePath();
                            ctx.clip();

                            // 將相機畫面完美烙印進幾何切片中
                            ctx.drawImage(
                                video, 
                                sx + driftX, sy + driftY, vSize, vSize, 
                                -W, -H, H * 2, H * 2
                            );
                            
                            ctx.restore();
                        }
                    }
                }
            }
            // 每秒 60 格無限循環同步渲染
            requestAnimationFrame(renderKaleidoscope);
        }

        // 隨機故障排程：1秒到3秒間隨機觸發
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    // 驗證機制：確保新尺寸與上一次至少有 0.5 以上的顯著跳躍差距，絕不卡死
                    do {
                        randomScale = (Math.random() * 3 + 1).toFixed(2); // 1~4 倍率
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.5);
                    
                    lastScale = targetScaleNum;
                    
                    // 執行全域外殼縮放
                    cameraWrapper.style.transform = `scale(${randomScale})`;
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 超高頻閃爍演算法（一組閃爍3~6下）
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 4) + 3; 
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
