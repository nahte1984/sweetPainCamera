<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.1.0 sweet pain kaleidoscope camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
            transform-origin: center center;
            will-change: transform;
        }

        /* 萬花筒各格子內的視訊流，繼承你原本的泡泡糖與細緻模糊效果 */
        .camera-feed-clone {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            animation: bubblegum-and-blur 10s linear infinite;
            transform-origin: top left;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(5px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.1rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper"></div>
    
    <div id="overlay-emoji">🥲</div>
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        let lastScale = 1.00;
        const videoElements = []; // 用來統一存放所有萬花筒內的視訊克隆體

        // --- 【核心：Fig. 36 萬花筒幾何網格生成器】 ---
        function generateKaleidoscope() {
            // 依據螢幕大小動態計算單個 30-60-90 三角形單元的核心尺寸 (H = 長直角邊)
            const H = Math.max(window.innerWidth, window.innerHeight) * 0.3;
            // 短直角邊 W = H * tan(30度)
            const W = H * Math.tan(30 * Math.PI / 180);

            // 設置 12 角對稱星芒 lattice 的網格間距
            const hSpacing = H * Math.sqrt(3);
            const vSpacing = 2 * H;
            
            const cols = Math.ceil((window.innerWidth + 4 * H) / hSpacing);
            const rows = Math.ceil((window.innerHeight + 4 * H) / vSpacing);

            // 用一個隱藏的容器把所有碎片裝起來
            const kContainer = document.createElement('div');
            kContainer.style.position = 'absolute';
            kContainer.style.top = '0'; kContainer.style.left = '0';
            kContainer.style.width = '100vw'; kContainer.style.height = '100vh';
            cameraWrapper.appendChild(kContainer);

            // 開始無縫舖滿畫面
            for (let c = -2; c < cols + 2; c++) {
                for (let r = -2; r < rows + 2; r++) {
                    let x = c * hSpacing;
                    let y = r * vSpacing;
                    
                    // 奇數欄位依據三角點陣進行錯位 y 軸偏移
                    if (Math.abs(c) % 2 === 1) {
                        y += H;
                    }
                    
                    // 在每個中心點，依據 Fig.36 環繞出 12 個 30-60-90 度的鏡像鏡面
                    for (let i = 0; i < 12; i++) {
                        const cell = document.createElement('div');
                        cell.style.position = 'absolute';
                        cell.style.left = `${x}px`;
                        cell.style.top = `${y}px`;
                        cell.style.width = `${W}px`;
                        cell.style.height = `${H}px`;
                        cell.style.transformOrigin = 'top left';
                        // 使用精準的 CSS clip-path 將容器裁切成 Fig.36 的直角三角形
                        cell.style.clipPath = 'polygon(0% 0%, 0% 100%, 100% 100%)';
                        cell.style.overflow = 'hidden';

                        // 偶數順時鐘旋轉，奇數鏡像翻轉，達成完璧的物理萬花筒反射線條
                        if (i % 2 === 0) {
                            cell.style.transform = `rotate(${i * 30}deg)`;
                        } else {
                            cell.style.transform = `rotate(${(i + 1) * 30}deg) scaleX(-1)`;
                        }

                        // 塞入即時視訊克隆體
                        const v = document.createElement('video');
                        v.autoplay = true;
                        v.playsInline = true;
                        v.muted = true;
                        v.className = 'camera-feed-clone';
                        
                        cell.appendChild(v);
                        kContainer.appendChild(cell);
                        videoElements.push(v);
                    }
                }
            }
        }

        // 先執行萬花筒網格架設
        generateKaleidoscope();

        // 啟動相機並分流至所有萬花筒格子
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    // 將相機串流同時注入到所有的萬花筒視訊碎片中
                    videoElements.forEach((vid) => {
                        vid.srcObject = stream;
                        vid.play();
                    });
                    
                    // 用第一個視訊流的播放事件來當作全域計時器的起點
                    videoElements[0].onplaying = () => {
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        scheduleNextGlitch();
                    };
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // 隨機故障排程：1秒到3秒間隨機觸發
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    // 驗證新尺寸與上一次的尺寸至少有 0.5 以上的顯著跳躍差距
                    do {
                        randomScale = (Math.random() * 3 + 1).toFixed(2); // 1~4 倍率
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.5);
                    
                    lastScale = targetScaleNum;
                    
                    // 執行萬花筒全域外殼縮放
                    cameraWrapper.style.transform = `scale(${randomScale})`;
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 超高頻閃爍演算法（閃爍3~6下）
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 4) + 3; 
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
