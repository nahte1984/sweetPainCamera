<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>v9.3.0 sweet pain kaleidoscope camera</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
        }

        /* 萬花筒幾何外殼：現在完全固定，不再進行全域縮放 */
        #camera-wrapper {
            position: absolute;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none;
        }

        /* 保持 10 秒泡泡糖色相環與 5px 精緻模糊 */
        #kaleidoscope-canvas {
            width: 100%; height: 100%;
            display: block;
            animation: bubblegum-and-blur 10s linear infinite;
        }

        @keyframes bubblegum-and-blur {
            0% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(0deg) blur(0px);
            }
            50% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(180deg) blur(5px);
            }
            100% {
                filter: contrast(120%) saturate(260%) brightness(110%) hue-rotate(360deg) blur(0px);
            }
        }

        #overlay-emoji {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.1rem;
            user-select: none;
            pointer-events: none;
            z-index: 10;
            
            transition: opacity 1s ease-out, visibility 1s ease-out;
            opacity: 1;
            visibility: visible;
        }

        #overlay-emoji.fade-out {
            opacity: 0;
            visibility: hidden;
        }

        /* 整個畫面全螢幕閃白圖層 */
        #flash-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        #error-msg {
            position: absolute; top: 20px; left: 20px;
            color: #ff4a4a; font-family: monospace; z-index: 20;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="camera-wrapper">
        <canvas id="kaleidoscope-canvas"></canvas>
    </div>
    
    <video id="camera-feed" autoplay playsinline muted style="position:absolute; width:1px; height:1px; opacity:0; pointer-events:none;"></video>
    
    <div id="overlay-emoji">🥲</div>
    <div id="flash-layer"></div>
    <div id="error-msg"></div>

    <script>
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('kaleidoscope-canvas');
        const ctx = canvas.getContext('2d');
        
        const cameraWrapper = document.getElementById('camera-wrapper');
        const errorMsg = document.getElementById('error-msg');
        const overlayEmoji = document.getElementById('overlay-emoji');
        const flashLayer = document.getElementById('flash-layer');

        // 全域控制變數
        let currentScale = 1.00; // 內部畫面的即時放大倍率
        let lastScale = 1.00;

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            const constraints = { video: { facingMode: "environment" }, audio: false };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    
                    video.onplaying = () => {
                        setTimeout(() => {
                            overlayEmoji.classList.add('fade-out');
                        }, 1000);
                        
                        requestAnimationFrame(renderKaleidoscope);
                        scheduleNextGlitch();
                    };
                    video.play();
                })
                .catch(function(err) {
                    errorMsg.innerText = "無法存取相機，請確認已給予權限。";
                });
        } else {
            errorMsg.innerText = "你的瀏覽器不支援相機功能。";
        }

        // --- 【萬花筒渲染引擎】 ---
        function renderKaleidoscope() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                const screenWidth = canvas.width;
                const screenHeight = canvas.height;

                ctx.clearRect(0, 0, screenWidth, screenHeight);

                // Fig. 36 幾何比例計算 (H = 長直角邊)
                const H = Math.max(screenWidth, screenHeight) * 0.4;
                const W = H * Math.tan(30 * Math.PI / 180); // 短直角邊

                const hSpacing = H * Math.sqrt(3);
                const vSpacing = H * 2;

                const cols = Math.ceil(screenWidth / hSpacing) + 2;
                const rows = Math.ceil(screenHeight / vSpacing) + 2;

                // 【修正重點2】依據當前隨機倍率 (currentScale) 動態縮小視訊擷取框，達成「形狀內放大」效果
                const baseVSize = Math.min(video.videoWidth, video.videoHeight) * 0.6;
                const zoomedVSize = baseVSize / currentScale; 
                
                const sx = (video.videoWidth - zoomedVSize) / 2;
                const sy = (video.videoHeight - zoomedVSize) / 2;

                // 微幅緩慢飄移
                const driftX = Math.sin(Date.now() / 3000) * (video.videoWidth - zoomedVSize) * 0.05;
                const driftY = Math.cos(Date.now() / 3000) * (video.videoHeight - zoomedVSize) * 0.05;

                for (let c = -1; c < cols; c++) {
                    for (let r = -1; r < rows; r++) {
                        let cx = c * hSpacing;
                        let cy = r * vSpacing;

                        if (Math.abs(c) % 2 === 1) {
                            cy += H;
                        }

                        // 12 瓣鏡像反射
                        for (let i = 0; i < 12; i++) {
                            ctx.save();
                            ctx.translate(cx, cy);
                            ctx.rotate(i * 30 * Math.PI / 180);
                            
                            if (i % 2 === 1) {
                                ctx.scale(1, -1);
                            }

                            // 精準切出 Fig. 36 三角片
                            ctx.beginPath();
                            ctx.moveTo(0, 0);
                            ctx.lineTo(W, H);
                            ctx.lineTo(0, H);
                            ctx.closePath();
                            ctx.clip();

                            // 【修正重點1】改為以 (-H, -H) 為中心均勻壓製，徹底解決鏡像時產生的黑畫面 Bug
                            ctx.drawImage(
                                video, 
                                sx + driftX, sy + driftY, zoomedVSize, zoomedVSize, 
                                -H, -H, H * 2, H * 2
                            );
                            
                            ctx.restore();
                        }
                    }
                }
            }
            requestAnimationFrame(renderKaleidoscope);
        }

        // 隨機故障排程：1秒到3秒間隨機觸發
        function scheduleNextGlitch() {
            const randomCooldown = Math.random() * 2000 + 1000; 
            
            setTimeout(() => {
                triggerGlitchCluster(() => {
                    let randomScale;
                    let targetScaleNum;

                    // 驗證機制：確保尺寸跳躍差距
                    do {
                        randomScale = (Math.random() * 3 + 1).toFixed(2); // 1~4 倍率
                        targetScaleNum = parseFloat(randomScale);
                    } while (Math.abs(targetScaleNum - lastScale) < 0.5);
                    
                    lastScale = targetScaleNum;
                    
                    // 變更內部視訊放大倍率，不再變動外層相機Wrapper
                    currentScale = targetScaleNum;
                    
                    scheduleNextGlitch();
                });
            }, randomCooldown);
        }

        // 超高頻閃爍演算法
        function triggerGlitchCluster(callback) {
            const flashCount = Math.floor(Math.random() * 4) + 3; 
            let currentFlash = 0;

            function runSingleFlash() {
                if (currentFlash >= flashCount) {
                    callback();
                    return;
                }

                flashLayer.style.opacity = (Math.random() * 0.3 + 0.7).toString();
                
                setTimeout(() => {
                    flashLayer.style.opacity = '0';
                    currentFlash++;
                    
                    setTimeout(runSingleFlash, Math.random() * 32 + 8);
                }, Math.random() * 9 + 3);
            }

            runSingleFlash();
        }
    </script>
</body>
</html>
